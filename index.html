<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="stylesheet" href="app.css?v=1772807941">

<body>

<!-- ══ 花丸オーバーレイ ══ -->
<div id="hanamaru-ov">
  <svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <circle class="hm-ring" cx="150" cy="150" r="120" stroke-width="22"/>
    <circle class="hm-ring" cx="150" cy="150" r="140"
      stroke-width="7" stroke="#FF6060" opacity=".55"
      style="stroke-dasharray:879;stroke-dashoffset:879;animation-delay:.08s;"/>
  </svg>
</div>

<div id="app">

<!-- ══ INTRO MODAL ══ -->
<div id="intro-modal" onclick="closeIntroModal(event)">
  <div class="intro-content">
    <!-- くくるんキャラ（左） -->
    <svg 
        id="intro-kukurun-svg"
        width="120" 
        height="120" 
        viewBox="0 0 100 100"
        class="kukurun-character"
        style="width:120px;height:120px;flex-shrink:0;"
      >
        <defs>
          <radialGradient id="introBodyGrad" cx="42%" cy="35%" r="58%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="60%" stop-color="#b8d9ff" />
            <stop offset="100%" stop-color="#6aabee" />
          </radialGradient>
          <radialGradient id="introEyeGrad" cx="35%" cy="30%" r="65%">
            <stop offset="0%" stop-color="#6699ff" />
            <stop offset="100%" stop-color="#003399" />
          </radialGradient>
          <filter id="introSoftShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0055aa" flood-opacity="0.18"/>
          </filter>
        </defs>
        <!-- 体（まんまる） -->
        <circle cx="50" cy="54" r="38" fill="url(#introBodyGrad)" filter="url(#introSoftShadow)"/>
        <!-- ほっぺ -->
        <ellipse cx="28" cy="62" rx="7" ry="5" fill="#ffaacc" fill-opacity="0.45" />
        <ellipse cx="72" cy="62" rx="7" ry="5" fill="#ffaacc" fill-opacity="0.45" />
        <!-- 目 -->
        <g id="intro-kukurun-eyes">
          <g transform="translate(37, 48)">
            <circle r="5.8" fill="url(#introEyeGrad)" />
            <circle cx="1.4" cy="-1.8" r="1.8" fill="white" />
          </g>
          <g transform="translate(63, 48)">
            <circle r="5.8" fill="url(#introEyeGrad)" />
            <circle cx="-1.4" cy="-1.8" r="1.8" fill="white" />
          </g>
        </g>
        <!-- 口 -->
        <g id="intro-kukurun-mouth">
          <path id="intro-kukurun-mouth-fill" d="M 45,60 C 46,62 48,62 50,60 C 52,62 54,62 55,60" fill="none" stroke="#334" stroke-width="2.2" stroke-linecap="round" />
          <circle id="intro-kukurun-tongue" cx="50" cy="64" r="4" fill="#ff88aa" style="display:none;" />
        </g>
        <!-- 頭の飾り -->
        <ellipse cx="50" cy="17" rx="8" ry="6" fill="#a0c8ff" fill-opacity="0.7" />
        <circle cx="50" cy="12" r="4" fill="#6aabee" />
      </svg>

    <!-- 吹き出し（右） -->
    <div class="intro-balloon">
      <div class="intro-balloon-text">くくるんだよ<br>いっしょに　がんばろうね！</div>
      <div class="balloon-tail"></div>
    </div>
  </div>
</div>

    <div class="kana-grid" id="kana-grid"></div>

      きめた！

<script>
/* ── home-creature-wrap: visibility制御パッチ ──
   app.jsがdisplay:'flex'でshow/hideしているのを
   visibility:'visible'/'hidden'に差し替える           */
(function() {
  const _orig = document.getElementById.bind(document);
  // updateCreatureが呼ばれた後にhomeWrapの状態を監視して修正
  const _patch = () => {
    const wrap = document.getElementById('home-creature-wrap');
    if (!wrap) return;
    // MutationObserverでdisplay変更を検知してvisibilityに変換
    const mo = new MutationObserver(() => {
      if (wrap.style.display === 'none') {
        wrap.style.display = 'flex';
        wrap.style.visibility = 'hidden';
      } else if (wrap.style.display === 'flex') {
        wrap.style.visibility = 'visible';
      }
    });
    mo.observe(wrap, { attributes: true, attributeFilter: ['style'] });
    // 初期状態も設定
    wrap.style.display = 'flex';
    wrap.style.visibility = 'hidden';
  };
  document.addEventListener('DOMContentLoaded', _patch);
})();
</script>
