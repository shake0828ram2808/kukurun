<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>かなキーボード 確認モック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root {
  --font:    'Kosugi Maru', sans-serif;
  --theme:   #5C5FE8;
  --theme-lt:#EEEEFF;
  --theme-dk:#4044C0;
  --bg:      #D6EEFA;
  --surface: #FFFFFF;
  --surface2:#EAF5FF;
  --red:     #E03030;
  --red-lt:  #FFECEC;
  --text:    #1B2640;
  --text2:   #566480;
  --border:  #BDD4EA;
  --r:       16px;
  --r-sm:    10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button:focus, button:focus-visible { outline: none; }

html, body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100dvh;
  color: var(--text);
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 60px;
  gap: 16px;
}

/* モックラベル */
.mock-label {
  font-size: 11px;
  color: var(--text2);
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: 4px 10px;
  background: rgba(255,255,255,.6);
  border-radius: 999px;
  border: 1px solid var(--border);
}

/* カード */
.card {
  background: var(--surface);
  border-radius: var(--r);
  padding: 14px;
  width: 100%;
  max-width: 430px;
  box-shadow: 0 2px 10px rgba(27,38,64,.07);
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* 名前表示欄 */
.name-display {
  background: var(--surface2);
  border: 2px dashed var(--border);
  border-radius: var(--r-sm);
  min-height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  letter-spacing: .08em;
  margin-bottom: 10px;
  padding: 4px 10px;
  gap: 1px;
  flex-wrap: wrap;
}
.name-placeholder {
  font-size: 14px;
  color: var(--text2);
}
.char {
  display: inline-block;
  animation: charPop .18s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes charPop {
  from { transform: scale(.4) translateY(6px); opacity: 0; }
  to   { transform: scale(1) translateY(0);    opacity: 1; }
}

/* 削除ボタン行 */
.kana-del-row {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  align-items: stretch;
}
.kana-del-spacer { flex: 2; }
.kana-del-btn {
  padding: 0 2px;
  font-size: 12px;
  height: 32px;
  font-family: var(--font);
  border-radius: var(--r-sm);
  cursor: pointer;
  border: 2px solid;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .1s, transform .1s cubic-bezier(.34,1.56,.64,1);
}
.kana-del-btn:active { transform: scale(.92); }
.kana-del-hoka {
  flex: 1;
  background: #eef4ff; border-color: #aac4f0; color: var(--theme);
  font-weight: 700;
}
.kana-del-hoka:active { background: var(--theme); color: #fff; border-color: var(--theme); }
.kana-del-all {
  flex: 3;
  background: var(--red-lt); border-color: #F4AAAA; color: var(--red);
}
.kana-del-all:active { background: var(--red); color: #fff; }
.kana-del-one {
  flex: 3;
  background: var(--surface2); border-color: var(--border); color: var(--text2);
}
.kana-del-one:active { background: var(--border); color: var(--text); }

/* かなグリッド */
.kana-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  grid-template-rows: repeat(5, auto);
  grid-auto-flow: column;
  direction: rtl;
  gap: 4px;
  margin-bottom: 14px;
  width: 100%;
  justify-items: stretch;
}
.kana-btn {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--r-sm);
  padding: 8px 2px;
  font-size: 14px;
  cursor: pointer;
  color: var(--text);
  font-family: var(--font);
  line-height: 1;
  box-shadow: 0 3px 0 #BDD4EA;
  transition: border-color .1s, background .1s, transform .08s, box-shadow .08s;
  text-align: center;
}
.kana-btn:hover  { border-color: var(--theme); }
.kana-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #BDD4EA;
  background: var(--theme); color: #fff; border-color: var(--theme);
}

/* 決定ボタン */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--theme);
  color: #fff;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 3px 10px rgba(92,95,232,.28);
  transition: background .1s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary:active { transform: scale(.97); background: var(--theme-dk); }
.btn-primary:disabled { opacity: .4; pointer-events: none; }

/* ─── ほかモーダル ─── */
.hoka-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  z-index: 200;
  opacity: 0;
  transition: opacity .22s;
  display: none;
}
.hoka-overlay.visible { opacity: 1; }

.hoka-modal {
  position: fixed; left: 50%; bottom: 0;
  transform: translate(-50%, 100%);
  width: min(430px, 100vw);
  max-height: 75vh;
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(0,70,160,.15);
  z-index: 201;
  display: none;
  flex-direction: column;
  padding: 0 0 env(safe-area-inset-bottom, 0);
  transition: transform .22s cubic-bezier(.34,1.2,.64,1);
}
.hoka-modal.visible { transform: translate(-50%, 0); }

.hoka-modal-title {
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  padding: 14px 0 10px;
  border-bottom: 1.5px solid var(--border);
  font-family: var(--font);
}

.hoka-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 4px;
}

.hoka-grid {
  display: grid;
  gap: 4px;
  width: 100%;
  justify-items: stretch;
}

.hoka-kana-btn {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--r-sm);
  padding: 8px 2px;
  font-size: 14px;
  cursor: pointer;
  color: var(--text);
  font-family: var(--font);
  line-height: 1;
  box-shadow: 0 3px 0 #BDD4EA;
  text-align: center;
  transition: border-color .1s, background .1s, transform .08s, box-shadow .08s;
}
.hoka-kana-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 #BDD4EA;
  background: var(--theme); color: #fff; border-color: var(--theme);
}
.hoka-col-spacer { visibility: hidden; }

.hoka-close-btn {
  margin: 8px 14px 14px;
  padding: 12px;
  font-size: 14px;
  font-family: var(--font);
  border-radius: var(--r-sm);
  background: var(--surface2);
  border: 2px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-weight: 600;
  transition: background .1s;
  flex-shrink: 0;
}
.hoka-close-btn:active { background: var(--border); }

/* ─── 追加入力フィードバック ─── */
.flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1);
  font-size: 48px;
  pointer-events: none;
  z-index: 300;
  animation: flashPop .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes flashPop {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(.5); }
  40%  { opacity: 1; transform: translate(-50%,-60%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%,-80%) scale(1); }
}
</style>
</head>
<body>

<div class="mock-label">📋 かなキーボード　確認モック</div>

<div class="card">
  <div class="name-display" id="name-display">
    <span class="name-placeholder">ここに　でるよ</span>
  </div>

  <div class="kana-del-row">
    <button class="kana-del-btn kana-del-hoka" onclick="openHokaModal()">ほかのもじ</button>
    <div class="kana-del-spacer"></div>
    <button class="kana-del-btn kana-del-all" onclick="clearKana()">ぜんぶ　けす</button>
    <button class="kana-del-btn kana-del-one" onclick="delKana()">ひとつ　けす</button>
  </div>

  <div class="kana-grid" id="kana-grid"></div>

  <button class="btn-primary" id="ok-btn" disabled>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
    きめた！
  </button>
</div>

<!-- ほかモーダル -->
<div class="hoka-overlay" id="hoka-overlay" onclick="closeHokaModal()"></div>
<div class="hoka-modal" id="hoka-modal">
  <div class="hoka-modal-title">ほかの　もじ</div>
  <div class="hoka-modal-body" id="hoka-modal-body"></div>
  <button class="hoka-close-btn" onclick="closeHokaModal()">とじる</button>
</div>

<script>
// ─── データ ───────────────────────────
const KANA_ROWS = [
  ['あ','い','う','え','お'],
  ['か','き','く','け','こ'],
  ['さ','し','す','せ','そ'],
  ['た','ち','つ','て','と'],
  ['な','に','ぬ','ね','の'],
  ['は','ひ','ふ','へ','ほ'],
  ['ま','み','む','め','も'],
  ['や','ゆ','よ','わ','ん'],
  ['ら','り','る','れ','ろ'],
];

const HOKA_SECTIONS = [
  {
    title: 'だくてん・はんだくてん',
    rows: [
      ['が','ぎ','ぐ','げ','ご'],
      ['ざ','じ','ず','ぜ','ぞ'],
      ['だ','ぢ','づ','で','ど'],
      ['ば','び','ぶ','べ','ぼ'],
      ['ぱ','ぴ','ぷ','ぺ','ぽ'],
    ]
  },
  {
    title: 'ちいさいかな・のばすおと',
    rows: [
      ['っ','ゃ','ゅ','ょ','ー'],
    ]
  }
];

// ─── かなグリッド構築 ──────────────────
function buildKanaGrid() {
  const g = document.getElementById('kana-grid');
  KANA_ROWS.forEach(row =>
    row.forEach(k => {
      const b = document.createElement('button');
      b.className = 'kana-btn';
      b.textContent = k;
      b.onclick = () => addKana(k);
      g.appendChild(b);
    })
  );
}

// ─── 名前操作 ─────────────────────────
function getCurName() {
  const el = document.getElementById('name-display');
  return el.querySelector('.name-placeholder') ? '' : el.textContent;
}

function addKana(k) {
  const cur = getCurName();
  if (cur.length >= 8) return;
  const nd = document.getElementById('name-display');
  nd.innerHTML = '';
  const t = cur + k;
  [...t].forEach((c, i) => {
    const s = document.createElement('span');
    s.className = 'char';
    s.style.animationDelay = `${i * .04}s`;
    s.textContent = c;
    nd.appendChild(s);
  });
  document.getElementById('ok-btn').disabled = false;
  document.getElementById('ok-btn').style.opacity = '1';
  // フラッシュ演出
  showFlash(k);
}

function clearKana() {
  const nd = document.getElementById('name-display');
  nd.innerHTML = '<span class="name-placeholder">ここに　でるよ</span>';
  const ok = document.getElementById('ok-btn');
  ok.disabled = true; ok.style.opacity = '.4';
}

function delKana() {
  const cur = getCurName(); if (!cur) return;
  const t = cur.slice(0, -1);
  const nd = document.getElementById('name-display');
  if (!t) {
    nd.innerHTML = '<span class="name-placeholder">ここに　でるよ</span>';
    const ok = document.getElementById('ok-btn');
    ok.disabled = true; ok.style.opacity = '.4';
    return;
  }
  nd.innerHTML = '';
  [...t].forEach((c, i) => {
    const s = document.createElement('span');
    s.className = 'char'; s.textContent = c;
    nd.appendChild(s);
  });
}

function showFlash(k) {
  const el = document.createElement('div');
  el.className = 'flash';
  el.textContent = k;
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// ─── ほかモーダル ─────────────────────
let hokaBuilt = false;

function buildHokaModal() {
  if (hokaBuilt) return;
  hokaBuilt = true;
  const body = document.getElementById('hoka-modal-body');

  const allRows = [];
  HOKA_SECTIONS.forEach((sec, si) => {
    if (si > 0) allRows.push(null); // スペーサー列
    sec.rows.forEach(col => allRows.push(col));
  });

  const colCount = allRows.length;
  const grid = document.createElement('div');
  grid.className = 'hoka-grid';
  grid.style.gridTemplateColumns = `repeat(${colCount}, 1fr)`;
  grid.style.gridTemplateRows = 'repeat(5, auto)';
  grid.style.gridAutoFlow = 'column';
  grid.style.direction = 'rtl';

  allRows.forEach(col => {
    if (col === null) {
      for (let r = 0; r < 5; r++) {
        const sp = document.createElement('div');
        sp.className = 'hoka-col-spacer';
        grid.appendChild(sp);
      }
    } else {
      col.forEach(k => {
        const b = document.createElement('button');
        b.className = 'hoka-kana-btn';
        b.textContent = k;
        b.onclick = () => {
          addKana(k);
          closeHokaModal();
        };
        grid.appendChild(b);
      });
    }
  });

  body.appendChild(grid);
}

function openHokaModal() {
  buildHokaModal();
  const overlay = document.getElementById('hoka-overlay');
  const modal   = document.getElementById('hoka-modal');
  overlay.style.display = 'block';
  modal.style.display   = 'flex';
  requestAnimationFrame(() => {
    overlay.classList.add('visible');
    modal.classList.add('visible');
  });
}

function closeHokaModal() {
  const overlay = document.getElementById('hoka-overlay');
  const modal   = document.getElementById('hoka-modal');
  overlay.classList.remove('visible');
  modal.classList.remove('visible');
  setTimeout(() => {
    overlay.style.display = 'none';
    modal.style.display   = 'none';
  }, 220);
}

// ─── 初期化 ───────────────────────────
buildKanaGrid();

document.getElementById('ok-btn').style.opacity = '.4';
</script>
</body>
</html>
